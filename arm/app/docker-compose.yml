services:
  connect-app:
    image: hgunwant2312/zenodeck-connect:latest
    env_file:
      - .env.connect
    networks:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.campaign.entrypoints=websecure"
      - "traefik.http.routers.campaign.rule=PathPrefix(`/api/v1/connect`)"
      - "traefik.http.services.campaign.loadbalancer.server.port=3000"
      - "traefik.http.routers.campaign.tls.certresolver=tlsResolver"

  voice-agent:
    image: hgunwant2312/voice-agent:latest
    env_file:
      - .env.voice-agent
    networks:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.voice-agent.entrypoints=websecure"
      - "traefik.http.routers.voice-agent.rule=PathPrefix(`/api/v1/voice-agent`)"
      - "traefik.http.services.voice-agent.loadbalancer.server.port=3000"
      - "traefik.http.routers.voice-agent.tls.certresolver=tlsResolver"

networks:
  proxy:
    external: true
