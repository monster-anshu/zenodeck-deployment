# yaml-language-server: $schema=https://json.schemastore.org/traefik-v3.json
api:
  dashboard: true
  debug: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

serversTransport:
  insecureSkipVerify: true

providers:
  # swarm:
  #   endpoint: "unix:///var/run/docker.sock"
  #   watch: true
  #   exposedByDefault: false
  #   network: traefik_proxy
  file:
    directory: "/var/lib/traefik/conf"

certificatesResolvers:
  tlsResolver:
    acme:
      email: info@himanshu-gunwant.com
      storage: acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"

